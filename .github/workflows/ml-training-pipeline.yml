name: ML Training Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/data/**"
      - "src/features/**"
      - "src/models/**"
      - "configs/**"
      - "data/raw/**"
  pull_request:
    branches: [main]
    paths:
      - "src/data/**"
      - "src/features/**"
      - "src/models/**"
      - "configs/**"
      - "data/raw/**"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ml-pipeline
  cancel-in-progress: false

jobs:
  data-processing:
    name: Data Processing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data preprocessing
        run: |
          python src/data/run_processing.py \
            --input data/raw/house_data.csv \
            --output data/processed/cleaned_house_data.csv

      - name: Upload cleaned data
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-data
          path: data/processed/cleaned_house_data.csv
          retention-days: 1

  feature-engineering:
    name: Feature Engineering
    needs: data-processing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download cleaned data
        uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: data/processed/

      - name: Run feature engineering
        run: |
          python src/features/engineer.py \
            --input data/processed/cleaned_house_data.csv \
            --output data/processed/featured_house_data.csv \
            --preprocessor models/trained/preprocessor.pkl

      - name: Upload featured data
        uses: actions/upload-artifact@v4
        with:
          name: featured-data
          path: data/processed/featured_house_data.csv
          retention-days: 1

      - name: Upload preprocessor
        uses: actions/upload-artifact@v4
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl
          retention-days: 5

  model-training:
    name: Model Training
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download featured data
        uses: actions/download-artifact@v4
        with:
          name: featured-data
          path: data/processed/

      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: models/trained/

      - name: Start MLflow Server
        run: |
          docker run -d -p 5555:5000 --name mlflow-server \
            ghcr.io/mlflow/mlflow:latest \
            mlflow server --host 0.0.0.0 --port 5000 \
            --backend-store-uri sqlite:////mlflow/mlflow.db \
            --default-artifact-root mlflow-artifacts:/ \
            --artifacts-destination /mlflow/artifacts \
            --serve-artifacts

          # Wait for server readiness
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5555/health > /dev/null 2>&1; then
              echo "MLflow server is ready"
              break
            fi
            echo "Waiting for MLflow server... ($i/30)"
            sleep 2
          done

      - name: Train model
        run: |
          python src/models/train_model.py \
            --config configs/model_config.yaml \
            --data data/processed/featured_house_data.csv \
            --models-dir ./models \
            --mlflow-tracking-uri http://localhost:5555

      - name: Cleanup MLflow Server
        if: always()
        run: docker rm -f mlflow-server || true

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/trained/
          retention-days: 5
