name: Docker Publish Fast API Image

on:
  workflow_run:
    workflows: ["ML Training Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model artifacts (from triggering run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/trained/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest model artifacts (manual trigger)
        if: github.event_name != 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ml-training-pipeline.yml
          name: trained-model
          path: models/trained/
          workflow_conclusion: success

      - name: Validate model files exist
        run: |
          echo "Checking model files..."
          ls -la models/trained/
          if [ ! -f models/trained/house_price_model.pkl ]; then
            echo "::error::house_price_model.pkl not found. Run the ML Training Pipeline first."
            exit 1
          fi
          if [ ! -f models/trained/preprocessor.pkl ]; then
            echo "::error::preprocessor.pkl not found. Run the ML Training Pipeline first."
            exit 1
          fi
          echo "All model files found."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/fast-api-ml-project:${{ env.SHORT_SHA }}
            ${{ vars.DOCKER_USERNAME }}/fast-api-ml-project:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
