name: Docker Publish Streamlit Image
on:
  workflow_run:
    workflows: ["ML Training Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build-push-streamlit:
    name: Build & Push Streamlit Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: streamlit_app/
          file: ./streamlit_app/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streamlit-app:${{ env.SHORT_SHA }}
            ${{ vars.DOCKER_USERNAME }}/streamlit-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
