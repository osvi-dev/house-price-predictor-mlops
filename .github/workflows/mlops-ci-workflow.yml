name: MLops CI Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Data Preprocessing
        run: |
          python src/data/run_processing.py \
          --input data/raw/house_data.csv \
          --output data/processed/cleaned_house_data.csv

      - name: Feature Engineering
        run: |
          python src/features/engineer.py  \
          --input data/processed/cleaned_house_data.csv \
          --output data/processed/featured_house_data.csv \
          --preprocessor models/trained/preprocessor.pkl
      
      # The VM is already with docker, so u can run containers directly.
      - name: Install MLflow Image
        run: |
          docker pull ghcr.io/mlflow/mlflow:latest

      - name: Run MLflow Server
        run: |
          docker run -d -p 5555:5000 --name mlflow-tracking-server ghcr.io/mlflow/mlflow:latest \
          mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri \
          sqlite:////mlflow/mlflow.db --default-artifact-root mlflow-artifacts:/ \
          --artifacts-destination /mlflow/artifacts --serve-artifacts

      - name: Model Training
        run: |
          python src/models/train_model.py \
          --config configs/model_config.yaml
          --data data/processed/featured_house_data.csv \
          --models-dir models \
          --mlflow-tracking-uri http://localhost:5555

      - name: Clean containers
        run: |
          docker stop mlflow-tracking-server
          docker rm mlflow-tracking-server
          docker rmi ghcr.io/mlflow/mlflow:latest

    