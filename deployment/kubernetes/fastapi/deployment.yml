apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-deployment
  namespace: model
  labels:
    app: model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model
  template:
    metadata:
      labels:
        app: model
    spec:
      containers:
        - name: model
          image: osvadev01/fast-api-ml-project:latest
          ports:
            - containerPort: 8000